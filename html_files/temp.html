<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Waiting</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    html, body {
      margin: 0; height: 100vh;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column;
      background: radial-gradient(ellipse at center, #1e293b 0%, #0f172a 70%);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #94a3b8;
      gap: 12px;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(148, 163, 184, 0.15);
      border-top-color: #38bdf8;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hint { font-size: 13px; letter-spacing: 0.3px; }
    .arrow { font-size: 11px; color: #475569; }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <div class="hint">Waiting for input</div>
  <div class="arrow">&larr; pick a config to deploy</div>
</body>
</html>
