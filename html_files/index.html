<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Computational Graph &mdash; Console</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-1: #0f172a;
      --bg-2: #1e293b;
      --panel: #1e293b;
      --text-1: #f1f5f9;
      --text-2: #94a3b8;
      --accent: #38bdf8;
      --accent-2: #a78bfa;
      --border: rgba(255,255,255,0.06);
    }

    html, body {
      margin: 0; padding: 0; height: 100%;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg-1);
      color: var(--text-1);
      overflow: hidden;
    }

    .app {
      display: grid;
      grid-template-rows: auto 1fr;
      height: 100vh;
    }

    header {
      background: linear-gradient(90deg, #0f172a 0%, #1e293b 60%, #312e81 100%);
      color: var(--text-1);
      padding: 14px 24px;
      display: flex; align-items: center; gap: 14px;
      border-bottom: 1px solid var(--border);
      box-shadow: 0 4px 18px rgba(0,0,0,0.25);
      z-index: 2;
    }
    header .logo {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, #38bdf8, #a78bfa);
      border-radius: 8px;
      display: grid; place-items: center;
      font-weight: 700; font-size: 18px;
      box-shadow: 0 0 14px rgba(56,189,248,0.5);
    }
    header .title { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
    header .subtitle {
      font-size: 12px; color: var(--text-2); font-weight: 400;
      margin-left: auto;
    }
    header .badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 10px;
      background: rgba(56,189,248,0.12);
      border: 1px solid rgba(56,189,248,0.3);
      border-radius: 999px;
      font-size: 11px; color: var(--accent);
      font-family: 'JetBrains Mono', monospace;
    }
    header .badge .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #22c55e; box-shadow: 0 0 8px #22c55e;
      animation: blink 2s infinite;
    }
    @keyframes blink { 50% { opacity: 0.4; } }

    .layout {
      display: grid;
      grid-template-columns: 300px 1fr 280px;
      gap: 1px;
      background: var(--border);
      height: 100%;
    }
    iframe {
      width: 100%; height: 100%; border: none;
      background: var(--bg-1);
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="logo">&#10703;</div>
      <div>
        <div class="title">Computational Graph</div>
        <div class="subtitle">Advanced Programming &middot; Bar-Ilan University</div>
      </div>
      <div class="badge"><span class="dot"></span>localhost:8080</div>
    </header>
    <div class="layout">
      <iframe name="formFrame"   src="/app/form.html"></iframe>
      <iframe name="centerFrame" src="/app/temp.html"></iframe>
      <iframe name="rightFrame"  src="/app/temp.html"></iframe>
    </div>
  </div>
</body>
</html>
